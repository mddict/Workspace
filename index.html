<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <title>Moshi Workspace</title>
    <style>
        .contact-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 24px;
            background-color: #5865F2; 
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background-color 0.2s, transform 0.1s;
        }
        .contact-btn:hover {
            background-color: #4752C4;
            transform: translateY(-2px);
        }
        .contact-btn:active {
            transform: translateY(0);
        }
        .cat-image {
            width: 110px;
            height: auto;
            display: block;
        }
    </style>
</head>

<body>

    <canvas></canvas>

    <audio id="bgMusic" loop>
        <source src="background-music.mp3" type="audio/mpeg">
    </audio>

    <div class="toolbar">
        <button id="musicToggle" class="tool-btn">🔊</button>
    </div>

    <div class="ui-center">
        <div class="window">

            <div class="window-bar">Home</div>

            <div class="window-body">

                <div class="about-left">
                    <h1 class="title">About Me</h1>

                    <div class="about-text">
                        <p>
                            I’m a passionate programmer and game developer who enjoys creating
                            indie games and experiences.
                        </p>

                        <p>
                            I focus on making friendly games and turning creative ideas into
                            real projects, especially within the world of game development.
                        </p>

                        <a href="YOUR_DISCORD_LINK_HERE" target="_blank" class="contact-btn">Contact</a>
                    </div>
                </div>

                <div class="about-right">
                    <div class="pixel-cat">
                        <img src="cat.png" alt="Moshi Cat" class="cat-image">
                    </div>
                </div>

            </div>

        </div>
    </div>


    <script>
        // --- 1. STARFIELD BACKGROUND EFFECT ---
        const STAR_COLOR = '#fff';
        const STAR_SIZE = 3;
        const STAR_MIN_SCALE = 0.2;
        const OVERFLOW_THRESHOLD = 50;
        const STAR_COUNT = ( window.innerWidth + window.innerHeight ) / 8;

        const canvas = document.querySelector( 'canvas' ),
            context = canvas.getContext( '2d' );

        let scale = 1,
            width,
            height;

        let stars = [];

        let pointerX,
            pointerY;

        let velocity = { x: 0, y: 0, tx: 0, ty: 0, z: 0.0005 };

        let touchInput = false;

        generate();
        resize();
        step();

        window.onresize = resize;
        canvas.onmousemove = onMouseMove;
        canvas.ontouchmove = onTouchMove;
        canvas.ontouchend = onMouseLeave;
        document.onmouseleave = onMouseLeave;

        function generate() {
            for( let i = 0; i < STAR_COUNT; i++ ) {
                stars.push({
                    x: 0,
                    y: 0,
                    z: STAR_MIN_SCALE + Math.random() * ( 1 - STAR_MIN_SCALE )
                });
            }
        }

        function placeStar( star ) {
            star.x = Math.random() * width;
            star.y = Math.random() * height;
        }

        function recycleStar( star ) {
            let direction = 'z';
            let vx = Math.abs( velocity.x ),
                vy = Math.abs( velocity.y );

            if( vx > 1 || vy > 1 ) {
                let axis;

                if( vx > vy ) {
                    axis = Math.random() < vx / ( vx + vy ) ? 'h' : 'v';
                }
                else {
                    axis = Math.random() < vy / ( vx + vy ) ? 'v' : 'h';
                }

                if( axis === 'h' ) direction = velocity.x > 0 ? 'l' : 'r';
                else direction = velocity.y > 0 ? 't' : 'b';
            }

            star.z = STAR_MIN_SCALE + Math.random() * ( 1 - STAR_MIN_SCALE );

            if( direction === 'z' ) {
                star.z = 0.1;
                star.x = Math.random() * width;
                star.y = Math.random() * height;
            }
            else if( direction === 'l' ) {
                star.x = -OVERFLOW_THRESHOLD;
                star.y = height * Math.random();
            }
            else if( direction === 'r' ) {
                star.x = width + OVERFLOW_THRESHOLD;
                star.y = height * Math.random();
            }
            else if( direction === 't' ) {
                star.x = width * Math.random();
                star.y = -OVERFLOW_THRESHOLD;
            }
            else {
                star.x = width * Math.random();
                star.y = height + OVERFLOW_THRESHOLD;
            }
        }

        function resize() {
            scale = window.devicePixelRatio || 1;
            width = window.innerWidth * scale;
            height = window.innerHeight * scale;
            canvas.width = width;
            canvas.height = height;
            stars.forEach( placeStar );
        }

        function step() {
            context.clearRect( 0, 0, width, height );
            update();
            render();
            requestAnimationFrame( step );
        }

        function update() {
            velocity.tx *= 0.96;
            velocity.ty *= 0.96;

            velocity.x += ( velocity.tx - velocity.x ) * 0.8;
            velocity.y += ( velocity.ty - velocity.y ) * 0.8;

            stars.forEach( ( star ) => {
                star.x += velocity.x * star.z;
                star.y += velocity.y * star.z;

                star.x += ( star.x - width/2 ) * velocity.z * star.z;
                star.y += ( star.y - height/2 ) * velocity.z * star.z;
                star.z += velocity.z;

                if(
                    star.x < -OVERFLOW_THRESHOLD ||
                    star.x > width + OVERFLOW_THRESHOLD ||
                    star.y < -OVERFLOW_THRESHOLD ||
                    star.y > height + OVERFLOW_THRESHOLD
                ) {
                    recycleStar( star );
                }
            });
        }

        function render() {
            stars.forEach( ( star ) => {
                context.beginPath();
                context.lineCap = 'round';
                context.lineWidth = STAR_SIZE * star.z * scale;
                context.globalAlpha = 0.5 + 0.5*Math.random();
                context.strokeStyle = STAR_COLOR;

                context.moveTo( star.x, star.y );

                let tailX = velocity.x * 2,
                    tailY = velocity.y * 2;

                if( Math.abs( tailX ) < 0.1 ) tailX = 0.5;
                if( Math.abs( tailY ) < 0.1 ) tailY = 0.5;

                context.lineTo( star.x + tailX, star.y + tailY );
                context.stroke();
            });
        }

        function movePointer( x, y ) {
            if( typeof pointerX === 'number' && typeof pointerY === 'number' ) {
                let ox = x - pointerX,
                    oy = y - pointerY;

                velocity.tx += ( ox / 8*scale ) * ( touchInput ? 1 : -1 );
                velocity.ty += ( oy / 8*scale ) * ( touchInput ? 1 : -1 );
            }

            pointerX = x;
            pointerY = y;
        }

        function onMouseMove( e ) {
            touchInput = false;
            movePointer( e.clientX, e.clientY );
        }

        function onTouchMove( e ) {
            touchInput = true;
            movePointer( e.touches[0].clientX, e.touches[0].clientY );
            e.preventDefault();
        }

        function onMouseLeave() {
            pointerX = null;
            pointerY = null;
        }


        // --- 2. MUSIC TOGGLE SYSTEM ---
        const musicBtn = document.getElementById('musicToggle');
        const bgMusic = document.getElementById('bgMusic');

        musicBtn.addEventListener('click', () => {
            if (bgMusic.paused) {
                bgMusic.play();
                musicBtn.textContent = '🔇'; 
            } else {
                bgMusic.pause();
                musicBtn.textContent = '🔊';
            }
        });
    </script>

</body>
</html>
