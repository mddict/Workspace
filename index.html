<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moshi Personal Space</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      color: white;

      /* gradient background instead of stars */
      background:
        radial-gradient(circle at top right, rgba(121,68,154,0.25), transparent),
        radial-gradient(circle at bottom left, rgba(41,196,255,0.25), transparent),
        #0a0c14;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* center container */
    .window {
      width: min(680px, 92vw);

      /* transparent glass effect */
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);

      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 14px;

      box-shadow:
        0 10px 40px rgba(0,0,0,0.4);

      overflow: hidden;

      /* fade in */
      opacity: 0;
      transform: translateY(20px) scale(0.96);
      animation: fadeIn 0.7s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .window-bar {
      background: rgba(0,0,0,0.5);
      padding: 12px 18px;
      font-size: 16px;
      color: #ccc;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .window-body {
      padding: 50px 30px;
      text-align: center;
    }

    .title {
      font-size: clamp(42px, 7vw, 72px);
      font-weight: 300;
      margin: 0;
      letter-spacing: -0.03em;
    }

    .title span {
      color: #ffb347;
      font-weight: 700;
    }

    .subtitle {
      margin-top: 12px;
      margin-bottom: 40px;
      color: rgba(255,255,255,0.7);
      font-size: 20px;
    }

    .icons {
      display: flex;
      justify-content: center;
      gap: 40px;
    }

    .icon-link {
      text-decoration: none;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: transform 0.2s;
    }

    .icon-link:hover {
      transform: translateY(-5px);
    }

    .icon-box {
      width: 70px;
      height: 70px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      background: rgba(255,255,255,0.05);
    }

    .icon-label {
      font-size: 14px;
      color: rgba(255,255,255,0.8);
    }

    /* music toggle */
    .toolbar {
      position: fixed;
      top: 16px;
      left: 16px;
    }

    .tool-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      font-size: 22px;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    .tool-btn:hover {
      background: rgba(255,255,255,0.2);
    }

    audio {
      display: none;
    }
  </style>
</head>

<body>

  <div class="toolbar">
    <button id="musicToggle" class="tool-btn">🔊</button>
  </div>

  <div class="window">
    <div class="window-bar">home</div>

    <div class="window-body">
      <h1 class="title">hi! i’m <span>moshi</span></h1>
      <div class="subtitle">moshi personal space · programmer</div>

      <div class="icons">
        <a class="icon-link" href="https://discord.com/" target="_blank">
          <div class="icon-box">💬</div>
          <div class="icon-label">discord</div>
        </a>

        <a class="icon-link" href="https://github.com/" target="_blank">
          <div class="icon-box">💻</div>
          <div class="icon-label">github</div>
        </a>
      </div>
    </div>
  </div>

  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <script>
    const music = document.getElementById("bgMusic");
    const btn = document.getElementById("musicToggle");
    let playing = false;

    btn.addEventListener("click", async () => {
      if (!playing) {
        await music.play();
        btn.textContent = "🔈";
        playing = true;
      } else {
        music.pause();
        btn.textContent = "🔊";
        playing = false;
      }
    });
  </script>

</body>
</html>
