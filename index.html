<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moshi Personal Space</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
      background: #ececec;
      color: #444;
      position: relative;
    }

    .toolbar {
      position: fixed;
      top: 14px;
      left: 14px;
      display: flex;
      gap: 10px;
      z-index: 20;
    }

    .tool-btn {
      width: 42px;
      height: 42px;
      border: none;
      background: transparent;
      font-size: 28px;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .tool-btn:hover {
      transform: scale(1.08);
    }

    .water {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 20vh;
      min-height: 90px;
      background: #aad0f2;
      z-index: 0;
    }

    .center-wrap {
      position: relative;
      z-index: 5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 70px 16px 110px;
    }

    .window {
      width: min(720px, 92vw);
      min-height: 430px;
      background: #f5f5f5;
      border: 2px solid #a5a5a5;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 6px 0 rgba(0,0,0,0.08), 0 10px 20px rgba(0,0,0,0.1);
      opacity: 0;
      transform: translateY(20px) scale(0.98);
      animation: fadeInWindow 0.8s ease forwards;
    }

    @keyframes fadeInWindow {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .window-bar {
      height: 42px;
      background: #4a4a4a;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 18px;
      font-size: 18px;
      text-transform: lowercase;
    }

    .window-body {
      min-height: 388px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 36px 24px 30px;
      text-align: center;
    }

    .title {
      margin: 0;
      font-size: clamp(38px, 7vw, 72px);
      line-height: 1;
      font-weight: 300;
      letter-spacing: -0.03em;
      color: #444;
    }

    .title .accent {
      color: #f29a11;
      font-weight: 700;
    }

    .subtitle {
      margin-top: 14px;
      margin-bottom: 34px;
      font-size: clamp(18px, 2vw, 24px);
      color: #6f6f6f;
    }

    .icon-row {
      display: flex;
      justify-content: center;
      gap: 42px;
      flex-wrap: wrap;
    }

    .social-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: #4e4e4e;
      transition: transform 0.15s ease;
    }

    .social-item:hover {
      transform: translateY(-4px);
    }

    .social-icon {
      width: 72px;
      height: 72px;
      border: 3px solid #666;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fdfdfd;
      font-size: 30px;
      box-shadow: 0 2px 0 rgba(0,0,0,0.06);
    }

    .social-label {
      font-size: 15px;
      font-weight: 700;
      text-transform: lowercase;
    }

    .footer {
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      z-index: 10;
      font-size: 14px;
      color: #666;
      text-align: center;
    }

    audio {
      display: none;
    }

    @media (max-width: 520px) {
      .icon-row {
        gap: 24px;
      }

      .social-icon {
        width: 64px;
        height: 64px;
        font-size: 26px;
      }

      .window-body {
        padding-top: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button class="tool-btn" title="star">⭐</button>
    <button class="tool-btn" id="musicToggle" title="toggle music">🔊</button>
  </div>

  <div class="water"></div>

  <div class="center-wrap">
    <div class="window">
      <div class="window-bar">home</div>

      <div class="window-body">
        <h1 class="title">hi! i’m <span class="accent">moshi</span></h1>
        <div class="subtitle">moshi personal space · programmer</div>

        <div class="icon-row">
          <a class="social-item" href="https://discord.com/" target="_blank">
            <div class="social-icon">💬</div>
            <div class="social-label">discord</div>
          </a>

          <a class="social-item" href="https://github.com/" target="_blank">
            <div class="social-icon">💻</div>
            <div class="social-label">github</div>
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">© 2026 Moshi</div>

  <audio id="bgMusic" loop>
    <source src="your-music-file.mp3" type="audio/mpeg">
  </audio>

  <script>
    const music = document.getElementById("bgMusic");
    const toggleBtn = document.getElementById("musicToggle");
    let playing = false;

    toggleBtn.addEventListener("click", async () => {
      try {
        if (!playing) {
          await music.play();
          toggleBtn.textContent = "🔈";
          playing = true;
        } else {
          music.pause();
          toggleBtn.textContent = "🔊";
          playing = false;
        }
      } catch (err) {
        console.log("Music could not play yet:", err);
      }
    });
  </script>
</body>
</html>
