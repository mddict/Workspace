<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Moshi's Personal Space</title>

<style>
  body {
    margin: 0;
    background: #000;
    overflow: hidden;
    font-family: Arial;
    color: white;
  }

  canvas {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  .content {
    position: relative;
    z-index: 10;
    padding: 60px;
  }

  h1 {
    font-size: 60px;
    font-weight: 300;
  }
</style>
</head>

<body>

<canvas></canvas>

<div class="content">
  <h1>Hello</h1>
  <p>Welcome to my space.</p>
</div>
<script>
const STAR_COLOR = '#fff';
const STAR_SIZE = 2.4;
const STAR_MIN_SCALE = 0.25;
const OVERFLOW_THRESHOLD = 50;
const STAR_COUNT = Math.floor((window.innerWidth + window.innerHeight) / 8);

const canvas = document.querySelector('canvas');
const context = canvas.getContext('2d');

let scale = 1;
let width = 0;
let height = 0;
let stars = [];

let pointerX = null;
let pointerY = null;

let velocity = { x: 0, y: 0, tx: 0, ty: 0, z: 0.0005 };
const MAX_VELOCITY = 6;

generate();
resize();
step();

window.addEventListener('resize', resize);
canvas.addEventListener('mousemove', onMouseMove);
canvas.addEventListener('touchmove', onTouchMove, { passive: false });
canvas.addEventListener('touchend', resetPointer);
document.addEventListener('mouseleave', resetPointer);

function generate() {
  stars = [];
  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
      x: 0,
      y: 0,
      z: STAR_MIN_SCALE + Math.random() * (1 - STAR_MIN_SCALE)
    });
  }
}

function placeStar(star) {
  star.x = Math.random() * width;
  star.y = Math.random() * height;
}

function recycleStar(star) {
  let direction = 'z';

  const vx = Math.abs(velocity.x);
  const vy = Math.abs(velocity.y);

  if (vx > 1 || vy > 1) {
    let axis;

    if (vx > vy) {
      axis = Math.random() < vx / (vx + vy) ? 'h' : 'v';
    } else {
      axis = Math.random() < vy / (vx + vy) ? 'v' : 'h';
    }

    if (axis === 'h') {
      direction = velocity.x > 0 ? 'l' : 'r';
    } else {
      direction = velocity.y > 0 ? 't' : 'b';
    }
  }

  star.z = STAR_MIN_SCALE + Math.random() * (1 - STAR_MIN_SCALE);

  if (direction === 'z') {
    star.x = Math.random() * width;
    star.y = Math.random() * height;
  } else if (direction === 'l') {
    star.x = -OVERFLOW_THRESHOLD;
    star.y = Math.random() * height;
  } else if (direction === 'r') {
    star.x = width + OVERFLOW_THRESHOLD;
    star.y = Math.random() * height;
  } else if (direction === 't') {
    star.x = Math.random() * width;
    star.y = -OVERFLOW_THRESHOLD;
  } else {
    star.x = Math.random() * width;
    star.y = height + OVERFLOW_THRESHOLD;
  }
}

function resize() {
  scale = window.devicePixelRatio || 1;
  width = window.innerWidth;
  height = window.innerHeight;

  canvas.width = width * scale;
  canvas.height = height * scale;
  canvas.style.width = width + 'px';
  canvas.style.height = height + 'px';

  context.setTransform(scale, 0, 0, scale, 0, 0);

  stars.forEach(placeStar);
}

function step() {
  context.clearRect(0, 0, width, height);

  velocity.tx *= 0.94;
  velocity.ty *= 0.94;

  velocity.x += (velocity.tx - velocity.x) * 0.35;
  velocity.y += (velocity.ty - velocity.y) * 0.35;

  velocity.x = clamp(velocity.x, -MAX_VELOCITY, MAX_VELOCITY);
  velocity.y = clamp(velocity.y, -MAX_VELOCITY, MAX_VELOCITY);

  for (const star of stars) {
    star.x += velocity.x * star.z;
    star.y += velocity.y * star.z;

    star.x += (star.x - width / 2) * velocity.z * star.z;
    star.y += (star.y - height / 2) * velocity.z * star.z;
    star.z += velocity.z;

    if (
      star.x < -OVERFLOW_THRESHOLD ||
      star.x > width + OVERFLOW_THRESHOLD ||
      star.y < -OVERFLOW_THRESHOLD ||
      star.y > height + OVERFLOW_THRESHOLD
    ) {
      recycleStar(star);
    }

    renderStar(star);
  }

  requestAnimationFrame(step);
}

function renderStar(star) {
  let tailX = velocity.x * 2;
  let tailY = velocity.y * 2;

  if (Math.abs(tailX) < 0.2) tailX = 0.2;
  if (Math.abs(tailY) < 0.2) tailY = 0.2;

  context.beginPath();
  context.lineCap = 'round';
  context.lineWidth = STAR_SIZE * star.z;
  context.globalAlpha = 0.5 + Math.random() * 0.5;
  context.strokeStyle = STAR_COLOR;

  context.moveTo(star.x, star.y);
  context.lineTo(star.x + tailX, star.y + tailY);
  context.stroke();
}

function movePointer(x, y) {
  if (pointerX !== null && pointerY !== null) {
    const ox = x - pointerX;
    const oy = y - pointerY;

    velocity.tx += ox / 25;
    velocity.ty += oy / 25;

    velocity.tx = clamp(velocity.tx, -MAX_VELOCITY, MAX_VELOCITY);
    velocity.ty = clamp(velocity.ty, -MAX_VELOCITY, MAX_VELOCITY);
  }

  pointerX = x;
  pointerY = y;
}

function onMouseMove(e) {
  movePointer(e.clientX, e.clientY);
}

function onTouchMove(e) {
  movePointer(e.touches[0].clientX, e.touches[0].clientY);
  e.preventDefault();
}

function resetPointer() {
  pointerX = null;
  pointerY = null;
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}
</script>

</body>
</html>
